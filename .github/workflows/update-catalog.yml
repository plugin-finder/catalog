name: Update catalog

# Daily refresh of plugin-index.json. Runs every day at 15:07 UTC (00:07 JST —
# just after midnight; a few minutes past the hour avoids GitHub's on-the-hour
# scheduling congestion). Also runnable on demand from the Actions tab.
# Free: this is a public repo on the standard runner.

on:
  schedule:
    - cron: '7 15 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-catalog
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rebuild plugin-index.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node build-plugin-index.mjs
      - name: Commit if changed
        run: |
          if git diff --quiet -- plugin-index.json; then
            echo "No catalog changes."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add plugin-index.json
            git commit -m "chore: daily catalog update"
            git push
          fi
